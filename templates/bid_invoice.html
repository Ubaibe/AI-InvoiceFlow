<!DOCTYPE html>
<html>

<head>

<title>Submit Bid</title>

</head>

<body>

<h1>

Submit Bid For

{{ invoice.invoice_number }}

</h1>

<form method="POST">

<label>

Bid APR (%)

</label>

<input
type="number"
step="0.1"
name="apr"
required>

<br><br>

<label>

Funding Amount

</label>

<input
type="number"
step="0.01"
name="amount"
required>

<br><br>

<button type="submit">

Submit Bid

</button>

</form>

</body>

</html>
