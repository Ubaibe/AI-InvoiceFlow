<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0">

    <title>Login | AI InvoiceFlow</title>

    <link
            rel="stylesheet"
            href="{{ url_for('static', filename='auth.css') }}">

</head>

<body>

<div class="login-container">

    <div class="login-left">

        <div class="brand">

            <h1>

                AI InvoiceFlow

            </h1>

            <p>

                Institutional Private Credit Marketplace

                powered by AI + Canton Network

            </p>

        </div>

        <div class="feature-list">

            <div class="feature">

                ✓ AI Underwriting

            </div>

            <div class="feature">

                ✓ Investment Committee Automation

            </div>

            <div class="feature">

                ✓ Institutional Auction Engine

            </div>

            <div class="feature">

                ✓ Canton Privacy Settlement

            </div>

        </div>

    </div>

    <div class="login-right">

        <div class="login-card">

            <h2>

                Welcome Back

            </h2>

            <p>

                Sign in to your institutional dashboard.

            </p>

            <form method="POST">

                <div class="input-group">

                    <label>Email Address</label>

                    <input
                            type="email"
                            name="email"
                            placeholder="name@company.com"
                            required>

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <input
                            type="password"
                            name="password"
                            placeholder="••••••••••"
                            required>

                </div>

                <button
                        type="submit"
                        class="login-btn">

                    Sign In

                </button>

                <hr>

                <button
                        type="button"
                        id="wallet-login"
                        class="btn btn-outline">

                    Login with Canton Wallet

                </button>

                <p>
                    Demo Mode
                </p>

            </form>

        </div>

    </div>

</div>

<script>

    document

    .getElementById(

    "wallet-login"

    )

    .addEventListener(

    "click",

    async ()=>{

    const response = await fetch(

    "/wallet_login"

    );

    const data = await response.json();

    alert(

    "Wallet Connected\n\n"+

    data.address

    );

    }

    );

</script>

</body>

</html>
